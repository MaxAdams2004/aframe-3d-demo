<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>a-frame demo</title>
        <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
</head>
<body>
        <a-scene color-space="sRGB" renderer="colorManagement: true; physicallyCorrectLights: true;" light="defaultLightsEnabled: false" reflection="directionaLight:a-light#dirLight;">
      <a-box color="green" position="5 4 -5" rotation="0 90 45" scale="2 2 2"></a-box>
      <a-box color="green" position="0 4 -5" rotation="0 0 0" scale="2 2 2"></a-box>

      <a-assets>
        <img id="skyTexture" src="./sky.png">
        <a-asset-item 
        id="flower" 
        src="./avatar.glb">
        </a-asset-item>

         <a-asset-item 
        id="objects" 
        src="./objects.glb">
        </a-asset-item>
        
        <img id="floorTexture" src="./cat.jpg">
        
      </a-assets>
      <a-entity>
        <a-gltf-model
          rotation="0 0 0"
          position="0 2.5 0"
          scale="1 1 1"
          src="#flower"
          animation-mixer>
          
        </a-gltf-model>
      </a-entity>
      
      <!--#2-->
      <a-entity>
        <a-gltf-model
          rotation="0 0 0"
          position="5 2.5 0"
          scale="1 1 5"
          src="#flower"
          animation-mixer>
          
        </a-gltf-model>
      </a-entity>

      <a-entity>
        <a-gltf-model
          rotation="0 0 0"
          position="5 0 8"
          scale="1 1 1"
          src="#objects"
          animation-mixer>
          
        </a-gltf-model>
      </a-entity>
       <a-camera position="-0.081 0.644 2.478" look-controls="enabled: true"></a-camera>


      <a-sky src="#skyTexture"></a-sky>
      <a-plane rotation="-90 0 0" width="30" height="30" src="#floorTexture"></a-plane>
      
  <a-light id="dirLight" type="directional" intensity="2.5"  position="0 2 3"></a-light>
  <a-light type="ambient" intensity="0.5"></a-light>

    </a-scene>
    

</body>
</html>
